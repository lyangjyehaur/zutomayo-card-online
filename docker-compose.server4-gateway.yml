# Stable server4 ingress for blue/green application slots. The generated HAProxy
# configuration controls 10% / 50% / 100% traffic weights without recreating the
# application containers. 1Panel OpenResty should proxy only to 127.0.0.1:3080.
name: ${GATEWAY_COMPOSE_PROJECT_NAME:-zutomayo-release-gateway}

services:
  gateway:
    image: ${GATEWAY_IMAGE:?Set GATEWAY_IMAGE to a verified immutable @sha256 digest}
    command:
      - haproxy
      - -W
      - -db
      - -f
      - /usr/local/etc/haproxy/haproxy.cfg
      - -p
      - /run/haproxy.pid
    ports:
      - name: http
        target: 8080
        published: '3080'
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - type: bind
        source: ${GATEWAY_CONFIG_FILE:-./.release-evidence/server4/haproxy.cfg}
        target: /usr/local/etc/haproxy/haproxy.cfg
        read_only: true
    networks:
      edge:
        aliases:
          - zutomayo-release-gateway
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run:rw,noexec,nosuid,nodev,size=4194304,mode=0770,uid=99,gid=99
      - /var/lib/haproxy:rw,noexec,nosuid,nodev,size=16777216,mode=0770,uid=99,gid=99
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://127.0.0.1:8080/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    stop_signal: SIGUSR1
    stop_grace_period: 30s

networks:
  edge:
    name: ${GATEWAY_EDGE_NETWORK:-zutomayo-release-edge}
    external: true
