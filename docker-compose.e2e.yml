# E2E 測試專用 docker-compose overlay。
# 使用方式：
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --abort-on-container-exit --exit-code-from e2e
#
# 與 docker-compose.yml 的差異：
#   - PG/Redis 使用測試專用 database（zutomayo_e2e / DB 1）
#   - 加入 seed 服務，在 migrate 後自動植入卡牌資料
#   - 加入 e2e runner 服務，跑 Playwright 測試
#   - report 目錄 bind-mount 到主機，方便 CI 提取 artifact
services:
  # The player-facing image route is intentionally exercised end-to-end. Keep
  # this deterministic test proxy in the E2E stack so a missing production
  # imgproxy configuration cannot silently turn card images into 503s.
  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:v4.0.11
    environment:
      IMGPROXY_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      IMGPROXY_SALT: fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
      IMGPROXY_ALLOWED_SOURCES: https://r2.dan.tw/cards/
    healthcheck:
      test: ['CMD', 'imgproxy', 'health']
      interval: 5s
      timeout: 3s
      retries: 12

  postgres:
    environment:
      POSTGRES_DB: zutomayo_e2e
    volumes:
      # 使用獨立 volume，避免與 dev 資料混在一起
      - pg-e2e-data:/var/lib/postgresql/data

  redis:
    volumes:
      - redis-e2e-data:/data

  migrate:
    environment:
      - PG_DATABASE=zutomayo_e2e

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ['sh', '-lc', 'npm run generate:e2e-card-seed -- /tmp/e2e-card-seed.json && npm run seed:cards']
    environment:
      - NODE_ENV=test
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_MIGRATION_USER:-zutomayo_migrator}
      - PG_PASSWORD=${PG_MIGRATION_PASSWORD:-${PG_PASSWORD:?Set PG_MIGRATION_PASSWORD or PG_PASSWORD in your environment or .env file}}
      - PG_DATABASE=zutomayo_e2e
      - SEED_CARD_FIXTURE_FILE=/tmp/e2e-card-seed.json
      - SEED_ALLOW_EMPTY_OFFICIAL_ERRATA=true
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: 'no'

  game:
    build:
      args:
        VITE_PLATFORM_URL: ws://platform:3002
    environment:
      - NODE_ENV=test
      - PG_DATABASE=zutomayo_e2e
      - REDIS_DB=1
      - ALLOWED_ORIGINS=http://game:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully

  api:
    environment:
      - NODE_ENV=test
      - PG_DATABASE=zutomayo_e2e
      - REDIS_DB=1
      - IMGPROXY_INTERNAL_BASE_URL=http://imgproxy:8080
      - IMGPROXY_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - IMGPROXY_SALT=fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
      - IMGPROXY_ALLOWED_SOURCES=https://r2.dan.tw/cards/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      imgproxy:
        condition: service_healthy

  platform:
    environment:
      - NODE_ENV=test
      - PG_DATABASE=zutomayo_e2e
      - REDIS_DB=1
      - ALLOWED_ORIGINS=http://game:3000

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    command: ['npx', 'playwright', 'test']
    environment:
      - E2E_BASE_URL=http://game:3000
      - CI=true
    depends_on:
      game:
        condition: service_healthy
      api:
        condition: service_healthy
      platform:
        condition: service_healthy
    volumes:
      # bind-mount report 目錄到主機，方便 CI 提取 artifact
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    restart: 'no'

volumes:
  pg-e2e-data:
  redis-e2e-data:
