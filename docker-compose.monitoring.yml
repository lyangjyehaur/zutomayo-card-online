# Monitoring stack for Zutomayo Card Online.
# Run alongside the main docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# Or standalone (requires the app network to exist):
#   docker compose -f docker-compose.monitoring.yml up -d
#
# This joins the app's default network so Prometheus and exporters can reach
# game/api/platform/postgres/redis by service name. Adjust APP_NETWORK if your
# compose project name differs from the default.
#
# Grafana is exposed on host port 3003 (avoids conflict with game:3000, api:3001).

services:
  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./observability/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    configs:
      - source: alertmanager_slack_webhook
        target: /etc/alertmanager/slack_webhook
    ports:
      - '127.0.0.1:9093:9093'
    networks:
      - default
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    command: ['--config.file=/etc/blackbox/blackbox.yml']
    volumes:
      - ./observability/prometheus/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - default
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/grafana/alerting/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus-data:/prometheus
    configs:
      - source: metrics_token
        target: /etc/prometheus/metrics_token
    ports:
      - '127.0.0.1:9090:9090'
    networks:
      - default
    restart: unless-stopped
    depends_on:
      - alertmanager
      - blackbox-exporter

  grafana:
    image: grafana/grafana:11.2.0
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./observability/grafana/alerting/contact-points.yml:/etc/grafana/provisioning/alerting/contact-points.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '127.0.0.1:3003:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in your environment or .env file}
      - GF_USERS_ALLOW_SIGN_UP=false
      - SLACK_ALERT_WEBHOOK=${SLACK_ALERT_WEBHOOK:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
    networks:
      - default
    depends_on:
      - prometheus
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${PG_MONITOR_USER:?Set PG_MONITOR_USER in your environment or .env file}:${PG_MONITOR_PASSWORD:?Set PG_MONITOR_PASSWORD in your environment or .env file}@${PG_MONITOR_HOST:?Set PG_MONITOR_HOST in your environment or .env file}:${PG_MONITOR_PORT:-5432}/${PG_MONITOR_DATABASE:?Set PG_MONITOR_DATABASE explicitly to the production database}?sslmode=${PG_MONITOR_SSLMODE:?Set PG_MONITOR_SSLMODE explicitly (verify-full in production)}
      - PGSSLROOTCERT=${PG_SSLROOTCERT:?Set PG_SSLROOTCERT to the mounted PostgreSQL CA}
    ports:
      - '127.0.0.1:9187:9187'
    networks:
      - default
    volumes:
      - ${PG_CA_FILE:?Set PG_CA_FILE to the mounted PostgreSQL CA}:/run/secrets/zutomayo-service-ca.crt:ro
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    command:
      - '--redis.addr=rediss://redis:6380'
      - '--redis.password=${REDIS_PASSWORD:?Set REDIS_PASSWORD for Redis TLS monitoring}'
      - '--tls-ca-cert-file=/run/secrets/zutomayo-service-ca.crt'
      - '--skip-tls-verification=false'
    ports:
      - '127.0.0.1:9121:9121'
    networks:
      - default
    volumes:
      - ${PG_CA_FILE:?Set PG_CA_FILE to the mounted service CA}:/run/secrets/zutomayo-service-ca.crt:ro
    restart: unless-stopped

  backup-metrics-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - '--collector.disable-defaults'
      - '--collector.textfile'
      - '--collector.textfile.directory=/var/lib/node_exporter/textfile_collector'
    volumes:
      - ${PG_BACKUP_METRICS_DIR:-/var/lib/node_exporter/textfile_collector}:/var/lib/node_exporter/textfile_collector:ro
    ports:
      - '127.0.0.1:9100:9100'
    networks:
      - default
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - '127.0.0.1:8080:8080'
    networks:
      - default
    restart: unless-stopped

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:

configs:
  metrics_token:
    content: '${METRICS_TOKEN:?Set a strong METRICS_TOKEN for Prometheus scraping}'
  alertmanager_slack_webhook:
    content: '${SLACK_ALERT_WEBHOOK:?Set SLACK_ALERT_WEBHOOK for alert delivery}'

networks:
  default:
    external: true
    name: ${APP_NETWORK:-zutomayo-card-online_default}
