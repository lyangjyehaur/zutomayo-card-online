      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 45s

  api-worker:
    <<: *api-service
    profiles: ['background-workers']
    environment:
      <<: *api-environment
      API_BACKGROUND_WORKERS_ENABLED: 'true'
    networks:
