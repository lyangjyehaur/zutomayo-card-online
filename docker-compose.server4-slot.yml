      1panel-network: {}
    deploy:
      replicas: 1

  platform-p1:
    <<: *platform-service
    environment:
      <<: *platform-environment
      PLATFORM_PUBLIC_ADDRESS: wss://${PUBLIC_HOST:?Set the public hostname without a scheme}/_platform/${RELEASE_SLOT:?Set RELEASE_SLOT to blue or green}/p1
    networks:
      default: {}
      1panel-network: {}
      edge:
        aliases:
          - platform-${RELEASE_SLOT:?Set RELEASE_SLOT to blue or green}-p1

  platform-p2:
    <<: *platform-service
    environment:
      <<: *platform-environment
      PLATFORM_PUBLIC_ADDRESS: wss://${PUBLIC_HOST:?Set the public hostname without a scheme}/_platform/${RELEASE_SLOT:?Set RELEASE_SLOT to blue or green}/p2
    networks:
      default: {}
      1panel-network: {}
      edge:
        aliases:
          - platform-${RELEASE_SLOT:?Set RELEASE_SLOT to blue or green}-p2

  colyseus-redis:
    image: ${COLYSEUS_REDIS_IMAGE:?Set COLYSEUS_REDIS_IMAGE to a verified immutable @sha256 digest}
    command:
      - /bin/sh
      - -ec
      - exec redis-server --save '' --appendonly no --requirepass "$${COLYSEUS_REDIS_PASSWORD}"
    environment:
      COLYSEUS_REDIS_PASSWORD: ${COLYSEUS_REDIS_PASSWORD:?Set a URL-safe Colyseus Redis password}
    expose:
      - '6379'
    networks:
      - default
    tmpfs:
      - /data:rw,noexec,nosuid,nodev,size=67108864,mode=0700,uid=999,gid=999
    healthcheck:
      test:
        - CMD-SHELL
        - REDISCLI_AUTH="$${COLYSEUS_REDIS_PASSWORD}" redis-cli --no-auth-warning ping | grep -qx PONG
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    stop_grace_period: 30s

networks:
  1panel-network:
    external: true
  edge:
    name: ${GATEWAY_EDGE_NETWORK:-zutomayo-release-edge}
    external: true

volumes:
  feedback_uploads:
    name: ${FEEDBACK_UPLOADS_VOLUME:?Set FEEDBACK_UPLOADS_VOLUME to the existing production feedback volume}
    external: true
