name: CD

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: '部署目標環境'
        type: choice
        options:
          - staging
          - production
        required: true
      tag:
        description: '部署的 image tag（staging 用 commit SHA，production 用版本號或 latest）'
        required: true

permissions:
  contents: write # 建立 GitHub Release
  packages: write # 推送 image 到 GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: lyangjyehaur/zutomayo-card-online

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build & Push：push to master → staging tag；push tag v* → production tag
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: game
            context: .
          - app: api
            context: ./api
          - app: platform
            context: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Production: tag v1.2.3 → image:1.2.3 + image:latest
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            # Staging: push to master → image:staging + image:<short-sha>
            SHA="${GITHUB_SHA::7}"
            echo "tags=${IMAGE}:staging,${IMAGE}:${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            APP_VERSION=${{ steps.pkg.outputs.version }}
            APP_BUILD_ID=${{ github.sha }}
            GAME_RULES_VERSION=${{ steps.pkg.outputs.version }}
            SENTRY_URL=${{ secrets.SENTRY_URL }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_SENTRY_TRACES_SAMPLE_RATE=${{ secrets.VITE_SENTRY_TRACES_SAMPLE_RATE }}
            VITE_UMAMI_WEBSITE_ID=${{ secrets.VITE_UMAMI_WEBSITE_ID }}
            VITE_UMAMI_SCRIPT_URL=${{ secrets.VITE_UMAMI_SCRIPT_URL }}
            VITE_UMAMI_HOST_URL=${{ secrets.VITE_UMAMI_HOST_URL }}
            VITE_UMAMI_TELEMETRY_SCRIPT_URL=${{ secrets.VITE_UMAMI_TELEMETRY_SCRIPT_URL }}
            VITE_UMAMI_SECONDARY_WEBSITE_ID=${{ secrets.VITE_UMAMI_SECONDARY_WEBSITE_ID }}
            VITE_UMAMI_SECONDARY_HOST_URL=${{ secrets.VITE_UMAMI_SECONDARY_HOST_URL }}
            VITE_IMGPROXY_BASE_URL=${{ secrets.VITE_IMGPROXY_BASE_URL }}
            VITE_PLATFORM_URL=${{ secrets.VITE_PLATFORM_URL }}

  # ─────────────────────────────────────────────────────────────
  # GitHub Release：tag v* 時自動建立 Release（含自動產生的 changelog）
  # ─────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ─────────────────────────────────────────────────────────────
  # SSH Deploy（手動觸發）：需要配置 DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY secrets
  #
  # Staging server 可能尚未準備好，故 staging 不自動部署；
  # Production 部署也可改用 scripts/deploy-server4.sh（含 rollback 支援）。
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: SSH Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            TAG="${{ inputs.tag }}"
            if [[ "${{ inputs.environment }}" == "staging" ]]; then
              cd "${{ secrets.STAGING_REMOTE_DIR || '/opt/zutomayo-card-online-staging' }}"
              export TAG
              docker compose -f docker-compose.staging.yml pull
              docker compose -f docker-compose.staging.yml up -d
              docker compose -f docker-compose.staging.yml ps
            else
              cd "${{ secrets.PRODUCTION_REMOTE_DIR || '/opt/zutomayo-card-online' }}"
              export TAG
              docker compose -f docker-compose.server4.yml pull
              docker compose -f docker-compose.server4.yml up -d
              docker compose -f docker-compose.server4.yml ps
            fi
