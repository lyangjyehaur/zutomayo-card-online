name: E2E Browser Matrix

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * 2,5'

permissions:
  contents: read

concurrency:
  group: e2e-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-matrix:
    name: Playwright ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit, android, iphone]
    env:
      PG_PASSWORD: e2e-test-password
      PG_BOOTSTRAP_USER: zutomayo_e2e_bootstrap
      PG_BOOTSTRAP_PASSWORD: e2e-test-bootstrap-password
      PG_MIGRATION_USER: zutomayo_migrator
      PG_MIGRATION_PASSWORD: e2e-test-migration-password
      PG_APP_USER: zutomayo_app
      PG_APP_PASSWORD: e2e-test-app-password
      JWT_SECRET: e2e-test-jwt-secret-at-least-32-bytes
      ACCOUNT_EXPORT_S3_BUCKET: zutomayo-e2e-account-exports
      ACCOUNT_EXPORT_S3_REGION: us-east-1
      ACCOUNT_EXPORT_S3_CREDENTIALS_MODE: default
      ACCOUNT_EXPORT_S3_VERSIONING_MODE: disabled
      ACCOUNT_EXPORT_S3_LIFECYCLE_CONFIRMED: 'true'
      ACCOUNT_EXPORT_PSEUDONYM_KEY: e2e-test-export-pseudonym-key-at-least-32-bytes
      REDIS_PASSWORD: ''
      METRICS_TOKEN: e2e-test-metrics-token
      PGSSLMODE: disable
      E2E_BROWSER_MATRIX: full
      EXPECTED_SCHEMA_MIGRATION: 000033_admin_linked_auth_contract
      EXPECTED_SCHEMA_CHECKSUM: 3e1140398d4b9de39cf3e95dfac626fc50ac587127c5c556e9e9ad3b63489c45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Run browser-specific E2E stack
        run: |
          test "$EXPECTED_SCHEMA_MIGRATION" = "$(find migrations -maxdepth 1 -type f -name '*.js' -printf '%f\n' | sort | tail -n 1 | sed 's/\.js$//')"
          test "$EXPECTED_SCHEMA_CHECKSUM" = "$(sha256sum "migrations/${EXPECTED_SCHEMA_MIGRATION}.js" | awk '{print $1}')"
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.e2e.yml \
            run --build --rm \
            -e E2E_BROWSER_MATRIX=full \
            e2e npx playwright test --project=${{ matrix.browser }}
        timeout-minutes: 30
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v || true
