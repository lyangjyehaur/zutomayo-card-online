name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Compose configuration
        env:
          PG_PASSWORD: e2e-test-password
          PG_MIGRATION_USER: zutomayo_migrator
          PG_MIGRATION_PASSWORD: e2e-test-migration-password
          PG_APP_USER: zutomayo_app
          PG_APP_PASSWORD: e2e-test-app-password
          PG_HOST: staging-postgres.example.internal
          PG_DATABASE: zutomayo
          PG_CA_FILE: /tmp/zutomayo-service-ca.crt
          PG_SSLROOTCERT: /run/secrets/zutomayo-service-ca.crt
          NODE_EXTRA_CA_CERTS: /run/secrets/zutomayo-service-ca.crt
          REDIS_URL: rediss://:e2e-test-redis-password@staging-redis.example.internal:6380
          JWT_SECRET: e2e-test-jwt-secret-32chars-min
          REDIS_PASSWORD: e2e-test-redis-password
          METRICS_TOKEN: e2e-test-metrics-token
          PGSSLMODE: verify-full
          APP_VERSION: '0.2.0'
          APP_BUILD_ID: '0000000000000000000000000000000000000000'
          GAME_RULES_VERSION: '0.2.0'
        run: |
          touch .env
          export EXPECTED_SCHEMA_MIGRATION="$(find migrations -maxdepth 1 -type f -name '*.js' -printf '%f\n' | sort | tail -n 1 | sed 's/\.js$//')"
          export EXPECTED_SCHEMA_CHECKSUM="$(sha256sum "migrations/${EXPECTED_SCHEMA_MIGRATION}.js" | awk '{print $1}')"
          npm run release:config
          npm run ops:config
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml config --quiet
          docker compose -f docker-compose.server4.yml config --no-env-resolution --quiet

      - name: Format check
        run: npm run format:check:tracked

      - name: Check card source-data policy
        run: npm run data:policy

      - name: Check card image policy
        run: npm run image:policy

      - name: Check version sync
        run: npm run version:check

      - name: Lint
        run: npm run lint

      - name: Typecheck (app)
        run: npm run typecheck

      - name: Typecheck (scripts)
        run: npm run typecheck:scripts

      - name: Check i18n completeness
        run: npm run i18n:check

      - name: Unit tests and coverage gate
        run: npm run test:coverage

      - name: Build
        env:
          # APP_BUILD_ID 設為 git commit hash，確保每次 CI build 有獨立 Sentry release。
          APP_BUILD_ID: ${{ github.sha }}
          # Source map 上傳到 GlitchTip（secrets 未設定時跳過上傳，僅產生 hidden source map）。
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      PG_PASSWORD: e2e-test-password
      JWT_SECRET: e2e-test-jwt-secret-32chars-min
      REDIS_PASSWORD: ''
      METRICS_TOKEN: e2e-test-metrics-token
      PGSSLMODE: disable

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Build and start service stack
        run: |
          set -o pipefail
          log_file="$(mktemp)"
          mkdir -p playwright-report test-results
          export EXPECTED_SCHEMA_MIGRATION="$(find migrations -maxdepth 1 -type f -name '*.js' -printf '%f\n' | sort | tail -n 1 | sed 's/\.js$//')"
          export EXPECTED_SCHEMA_CHECKSUM="$(sha256sum "migrations/${EXPECTED_SCHEMA_MIGRATION}.js" | awk '{print $1}')"
          echo "EXPECTED_SCHEMA_MIGRATION=$EXPECTED_SCHEMA_MIGRATION" >> "$GITHUB_ENV"
          echo "EXPECTED_SCHEMA_CHECKSUM=$EXPECTED_SCHEMA_CHECKSUM" >> "$GITHUB_ENV"
          export PG_MIGRATION_USER=zutomayo_migrator PG_MIGRATION_PASSWORD=e2e-test-migration-password
          export PG_APP_USER=zutomayo_app PG_APP_PASSWORD=e2e-test-app-password
          compose=(docker compose -f docker-compose.yml -f docker-compose.e2e.yml)
          if "${compose[@]}" up --build --wait --wait-timeout 180 game api platform \
            2>&1 | tee "$log_file" \
            && "${compose[@]}" run --build --rm e2e 2>&1 | tee -a "$log_file"; then
            exit 0
          fi
          service_status="$("${compose[@]}" ps --all --format '{{.Service}}={{.State}}/{{.ExitCode}}' | tr '\n' ' ')"
          echo "::error title=E2E service status::$service_status"
          for service in game api platform e2e; do
            service_log="$("${compose[@]}" logs --no-color --tail 40 "$service" | tr '\n' ' ' | sed 's/%/%25/g')"
            echo "::error title=E2E $service log::$service_log"
          done
          "${compose[@]}" logs --no-color --tail 80 migrate seed game api platform e2e \
            2>&1 | tee -a "$log_file" || true
          details="$(tail -n 60 "$log_file" | tr '\n' ' ' | sed 's/%/%25/g')"
          echo "::error title=E2E service stack::$details"
          exit 1
        timeout-minutes: 20

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.e2e.yml \
            down -v || true

  # Smoke tests 需要真實卡牌數據（422 張），CI 環境無法模擬
  # 本地執行: npm run smoke / smoke:api / smoke:online
  # smoke-tests:
  #   name: Smoke Tests
  #   runs-on: ubuntu-latest
  #   needs: lint-and-test
  #   ...
