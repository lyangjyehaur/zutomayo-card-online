name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck (app)
        run: npm run typecheck

      - name: Typecheck (scripts)
        run: npm run typecheck:scripts

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          # APP_BUILD_ID 設為 git commit hash，確保每次 CI build 有獨立 Sentry release。
          APP_BUILD_ID: ${{ github.sha }}
          # Source map 上傳到 GlitchTip（secrets 未設定時跳過上傳，僅產生 hidden source map）。
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build

  # Smoke tests 需要真實卡牌數據（422 張），CI 環境無法模擬
  # 本地執行: npm run smoke / smoke:api / smoke:online
  # smoke-tests:
  #   name: Smoke Tests
  #   runs-on: ubuntu-latest
  #   needs: lint-and-test
  #   ...
