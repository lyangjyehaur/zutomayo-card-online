name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check:tracked

      - name: Lint
        run: npm run lint

      - name: Typecheck (app)
        run: npm run typecheck

      - name: Typecheck (scripts)
        run: npm run typecheck:scripts

      - name: Check i18n completeness
        run: npm run i18n:check

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          # APP_BUILD_ID 設為 git commit hash，確保每次 CI build 有獨立 Sentry release。
          APP_BUILD_ID: ${{ github.sha }}
          # Source map 上傳到 GlitchTip（secrets 未設定時跳過上傳，僅產生 hidden source map）。
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    # E2E 需要完整服務棧，耗時較長；標記為可選，失敗不阻擋 PR 合併。
    continue-on-error: true
    env:
      PG_PASSWORD: e2e-test-password
      JWT_SECRET: e2e-test-jwt-secret-32chars-min
      REDIS_PASSWORD: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start service stack
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.e2e.yml \
            up \
            --abort-on-container-exit \
            --exit-code-from e2e \
            --build
        timeout-minutes: 20

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.e2e.yml \
            down -v || true

  # Smoke tests 需要真實卡牌數據（422 張），CI 環境無法模擬
  # 本地執行: npm run smoke / smoke:api / smoke:online
  # smoke-tests:
  #   name: Smoke Tests
  #   runs-on: ubuntu-latest
  #   needs: lint-and-test
  #   ...
