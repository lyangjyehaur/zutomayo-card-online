; PgBouncer configuration for zutomayo-card-online.
;
; NOTE: PgBouncer's ini file does NOT perform environment variable substitution.
; The ${PG_USER} / ${PG_PASSWORD} placeholders below must be replaced with real
; values at deploy time (e.g. via the edoburu/pgbouncer image env vars, a sed
; step, or a templating tool). The docker-compose.yml pgbouncer service uses the
; edoburu/pgbouncer image with DB_USER / DB_PASSWORD env vars, which auto-generate
; both pgbouncer.ini and userlist.txt at container start. This file is kept as a
; reference / custom-build source for operators who prefer a baked-in config.

[databases]
zutomayo = host=postgres port=5432 dbname=zutomayo user=${PG_USER} password=${PG_PASSWORD}
zutomayo_card = host=postgres port=5432 dbname=zutomayo_card user=${PG_USER} password=${PG_PASSWORD}
zutomayo_staging = host=postgres port=5432 dbname=zutomayo_staging user=${PG_USER} password=${PG_PASSWORD}

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100
max_user_connections = 50
server_idle_timeout = 300
server_lifetime = 3600
query_wait_timeout = 30
client_idle_timeout = 0
ignore_startup_parameters = extra_float_digits
