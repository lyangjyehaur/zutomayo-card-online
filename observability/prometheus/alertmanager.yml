global:
  resolve_timeout: 5m

route:
  receiver: zutomayo-default
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: zutomayo-critical
    - matchers:
        - severity="warning"
      receiver: zutomayo-warning

receivers:
  - name: zutomayo-default
    slack_configs:
      - api_url_file: /etc/alertmanager/slack_webhook
        channel: '#zutomayo-alerts'
        send_resolved: true
  - name: zutomayo-critical
    slack_configs:
      - api_url_file: /etc/alertmanager/slack_webhook
        channel: '#zutomayo-alerts'
        send_resolved: true
  - name: zutomayo-warning
    slack_configs:
      - api_url_file: /etc/alertmanager/slack_webhook
        channel: '#zutomayo-alerts'
        send_resolved: true
