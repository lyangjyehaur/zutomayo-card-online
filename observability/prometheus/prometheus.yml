# Prometheus configuration for Zutomayo Card Online.
# Scrapes game/api/platform metrics and probes platform health every 15s, plus
# postgres_exporter, redis_exporter, and cAdvisor infrastructure metrics.
# docker-compose.monitoring.yml mounts the shared metrics bearer token.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'zutomayo-game'
    metrics_path: /metrics
    bearer_token_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ['game:3000']
        labels:
          service: game

  - job_name: 'zutomayo-api'
    metrics_path: /metrics
    bearer_token_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ['api:3001']
        labels:
          service: api

  - job_name: 'zutomayo-platform'
    metrics_path: /metrics
    bearer_token_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ['platform:3002']
        labels:
          service: platform

  - job_name: 'zutomayo-platform-health'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://platform:3002/health']
        labels:
          service: platform
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
