# Prometheus configuration for Zutomayo Card Online.
# Scrapes game/api/platform metrics and probes platform health every 15s, plus
# postgres_exporter, redis_exporter, and cAdvisor infrastructure metrics.
# docker-compose.monitoring.yml mounts the shared metrics bearer token.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'zutomayo-game'
    metrics_path: /metrics
    bearer_token_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ['game-legacy:3000']
        labels:
          service: game
          release_slot: legacy
          process: legacy
    dns_sd_configs:
      - names: ['game-blue', 'game-green']
        type: A
        port: 3000
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_dns_name]
        regex: 'game-(blue|green)'
        target_label: release_slot
        replacement: '$1'
      - source_labels: [__meta_dns_name]
        regex: 'game-(blue|green)'
        target_label: service
        replacement: game
      - source_labels: [__meta_dns_name]
        regex: 'game-(blue|green)'
        target_label: process
        replacement: replica

  - job_name: 'zutomayo-api'
    metrics_path: /metrics
    bearer_token_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ['api-legacy:3001']
        labels:
          service: api
          release_slot: legacy
          process: legacy
    dns_sd_configs:
      - names: ['api-blue', 'api-green']
        type: A
        port: 3001
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_dns_name]
        regex: 'api-(blue|green)'
        target_label: release_slot
        replacement: '$1'
      - source_labels: [__meta_dns_name]
        regex: 'api-(blue|green)'
        target_label: service
        replacement: api
      - source_labels: [__meta_dns_name]
        regex: 'api-(blue|green)'
        target_label: process
        replacement: replica

  - job_name: 'zutomayo-platform'
    metrics_path: /metrics
    bearer_token_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ['platform-legacy:3002']
        labels:
          service: platform
          release_slot: legacy
          process: legacy
    dns_sd_configs:
      - names: ['platform-blue-p1', 'platform-blue-p2', 'platform-green-p1', 'platform-green-p2']
        type: A
        port: 3002
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: release_slot
        replacement: '$1'
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: service
        replacement: platform
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: process
        replacement: '$2'

  - job_name: 'zutomayo-platform-health'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://platform-legacy:3002/health']
        labels:
          service: platform
          release_slot: legacy
          process: legacy
    dns_sd_configs:
      - names: ['platform-blue-p1', 'platform-blue-p2', 'platform-green-p1', 'platform-green-p2']
        type: A
        port: 3002
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: release_slot
        replacement: '$1'
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: service
        replacement: platform
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: process
        replacement: '$2'
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__meta_dns_name, __address__]
        regex: '.+;(.+)'
        target_label: __param_target
        replacement: 'http://$1/health'
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'zutomayo-readiness'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://game-legacy:3000/ready']
        labels:
          service: game
          release_slot: legacy
          process: legacy
      - targets: ['http://api-legacy:3001/ready']
        labels:
          service: api
          release_slot: legacy
          process: legacy
      - targets: ['http://platform-legacy:3002/ready']
        labels:
          service: platform
          release_slot: legacy
          process: legacy
    dns_sd_configs:
      - names: ['game-blue', 'game-green']
        type: A
        port: 3000
        refresh_interval: 15s
      - names: ['api-blue', 'api-green']
        type: A
        port: 3001
        refresh_interval: 15s
      - names: ['platform-blue-p1', 'platform-blue-p2', 'platform-green-p1', 'platform-green-p2']
        type: A
        port: 3002
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_dns_name]
        regex: 'game-(blue|green)'
        target_label: release_slot
        replacement: '$1'
      - source_labels: [__meta_dns_name]
        regex: 'game-(blue|green)'
        target_label: service
        replacement: game
      - source_labels: [__meta_dns_name]
        regex: 'game-(blue|green)'
        target_label: process
        replacement: replica
      - source_labels: [__meta_dns_name]
        regex: 'api-(blue|green)'
        target_label: release_slot
        replacement: '$1'
      - source_labels: [__meta_dns_name]
        regex: 'api-(blue|green)'
        target_label: service
        replacement: api
      - source_labels: [__meta_dns_name]
        regex: 'api-(blue|green)'
        target_label: process
        replacement: replica
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: release_slot
        replacement: '$1'
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: service
        replacement: platform
      - source_labels: [__meta_dns_name]
        regex: 'platform-(blue|green)-(p[12])'
        target_label: process
        replacement: '$2'
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__meta_dns_name, __address__]
        regex: '.+;(.+)'
        target_label: __param_target
        replacement: 'http://$1/ready'
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'backup-metrics-exporter'
    static_configs:
      - targets: ['backup-metrics-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
