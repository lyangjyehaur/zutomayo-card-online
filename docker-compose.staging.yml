      - OTEL_EXPORTER_OTLP_HEADERS=${PLATFORM_OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_EXPORTER_OTLP_TRACES_HEADERS=${PLATFORM_OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      - OTEL_SERVICE_NAME=${PLATFORM_OTEL_SERVICE_NAME:-zutomayo-platform-staging}
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=staging}
      - PG_POOL_MAX=${PG_POOL_MAX:-20}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PLATFORM_DRAIN_GRACE_MS=${PLATFORM_DRAIN_GRACE_MS:-5000}
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3002/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 45s

secrets:
  postgres_ca:
    external: true
    name: ${PG_CA_SECRET_NAME:?Set PG_CA_SECRET_NAME to the external PostgreSQL CA secret}

volumes:
  feedback_uploads:
