    stop_grace_period: 45s

  platform:
    image: ${PLATFORM_IMAGE:?Set PLATFORM_IMAGE to a verified @sha256 digest}
    command: ['npm', 'run', 'platform']
    ports:
      - '4002:3002'
    secrets:
      - postgres_ca
    environment:
      - PLATFORM_PORT=3002
      - PLATFORM_PUBLIC_ADDRESS=${PLATFORM_PUBLIC_ADDRESS:?Set the absolute wss:// address advertised by this platform instance}
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:?Set APP_VERSION from the verified release manifest}
      - APP_BUILD_ID=${RELEASE_SHA:?Set RELEASE_SHA from the verified release manifest}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:?Set GAME_RULES_VERSION from the verified release manifest}
