# Staging 環境專用 docker-compose。
#
# 與 docker-compose.server4.yml 的差異：
#   - 使用 GHCR 預建 image（game / api / platform），不在 server 上 build
#   - 獨立的 PostgreSQL database（zutomayo_staging）與 Redis DB index（3）
#   - port 映射避開 production：4000（game）/ 4001（api）/ 4002（platform）
#   - 自帶 postgres / redis 容器，可獨立運行（不依賴 1panel-network）
#
# 使用方式：
#   TAG=staging docker compose -f docker-compose.staging.yml up -d
#   TAG=<commit-sha> docker compose -f docker-compose.staging.yml up -d
#
# 環境變數：
#   PG_PASSWORD, JWT_SECRET 等必填變數請透過 .env 提供（見 .env.example）。
#   GHCR_OWNER 可覆寫（fork 部署用），預設 lyangjyehaur。
#   TAG 控制要拉取的 image tag，預設 staging。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-zutomayo}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD in your environment or .env file}
      POSTGRES_DB: zutomayo_staging
    volumes:
      - pg-staging-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER:-zutomayo} -d zutomayo_staging']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--maxmemory-policy',
        'noeviction',
        '--requirepass',
        '${REDIS_PASSWORD:-}',
      ]
    volumes:
      - redis-staging-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "${REDIS_PASSWORD:-}" --no-auth-warning ping 2>/dev/null || redis-cli ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    # migrate 需要 builder stage（含 devDependencies / node-pg-migrate），
    # 因此仍在 server 上 build；其餘 app 服務一律使用 GHCR 預建 image。
    image: ghcr.io/${GHCR_OWNER:-lyangjyehaur}/zutomayo-card-online-migrate:${TAG:-staging}
    command: ['npm', 'run', 'db:migrate']
    env_file: .env
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=zutomayo_staging
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  game:
    image: ghcr.io/${GHCR_OWNER:-lyangjyehaur}/zutomayo-card-online-game:${TAG:-staging}
    ports:
      - '4000:3000'
    env_file: .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-}
      - APP_BUILD_ID=${APP_BUILD_ID:-}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=zutomayo_staging
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_DB=3
      - API_URL=${API_URL:-http://api:3001}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_CONN_PER_IP=${MAX_CONN_PER_IP:-10}
      - RANKED_MATCHES_ENABLED=${RANKED_MATCHES_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/${GHCR_OWNER:-lyangjyehaur}/zutomayo-card-online-api:${TAG:-staging}
    ports:
      - '4001:3001'
    env_file: .env
    environment:
      - API_PORT=3001
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-}
      - APP_BUILD_ID=${APP_BUILD_ID:-}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=zutomayo_staging
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_DB=3
      - IMGPROXY_INTERNAL_BASE_URL=${IMGPROXY_INTERNAL_BASE_URL:-}
      - IMGPROXY_KEY=${IMGPROXY_KEY:-}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-}
      - IMGPROXY_ALLOWED_SOURCES=${IMGPROXY_ALLOWED_SOURCES:-https://r2.dan.tw/cards/}
      - IMGPROXY_CACHE_CONTROL=${IMGPROXY_CACHE_CONTROL:-public, max-age=31536000, immutable}
      - RATE_LIMIT_IMGPROXY=${RATE_LIMIT_IMGPROXY:-600}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  platform:
    image: ghcr.io/${GHCR_OWNER:-lyangjyehaur}/zutomayo-card-online-platform:${TAG:-staging}
    command: ['npm', 'run', 'platform']
    ports:
      - '4002:3002'
    env_file: .env
    environment:
      - PLATFORM_PORT=3002
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-}
      - APP_BUILD_ID=${APP_BUILD_ID:-}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=zutomayo_staging
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_DB=3
      - PLATFORM_REDIS_MODE=redis
      - PLATFORM_FRIEND_STORE=postgres
      - PLATFORM_MATCH_PARTICIPANT_STORE=postgres
      - PLATFORM_CHAT_PREVIEW_STORE=postgres
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg-staging-data:
  redis-staging-data:
