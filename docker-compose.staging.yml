      - ACCOUNT_EXPORT_EXPIRY_SECONDS=${ACCOUNT_EXPORT_EXPIRY_SECONDS:-604800}
      - ACCOUNT_EXPORT_MAX_ATTEMPTS=${ACCOUNT_EXPORT_MAX_ATTEMPTS:-5}
      - ACCOUNT_EXPORT_BASE_RETRY_MS=${ACCOUNT_EXPORT_BASE_RETRY_MS:-5000}
      - ACCOUNT_EXPORT_MAX_RETRY_MS=${ACCOUNT_EXPORT_MAX_RETRY_MS:-300000}
      - ACCOUNT_EXPORT_MAX_BYTES=${ACCOUNT_EXPORT_MAX_BYTES:-104857600}
      - REDIS_COMMAND_TIMEOUT_MS=${REDIS_COMMAND_TIMEOUT_MS:-1500}
      - RELATIONSHIP_OUTBOX_INTERVAL_MS=${RELATIONSHIP_OUTBOX_INTERVAL_MS:-500}
      - RELATIONSHIP_OUTBOX_BATCH_SIZE=${RELATIONSHIP_OUTBOX_BATCH_SIZE:-50}
      - RELATIONSHIP_OUTBOX_LEASE_MS=${RELATIONSHIP_OUTBOX_LEASE_MS:-30000}
      - RELATIONSHIP_OUTBOX_MAX_ATTEMPTS=${RELATIONSHIP_OUTBOX_MAX_ATTEMPTS:-10}
      - RELATIONSHIP_OUTBOX_BASE_RETRY_MS=${RELATIONSHIP_OUTBOX_BASE_RETRY_MS:-500}
      - RELATIONSHIP_OUTBOX_MAX_RETRY_MS=${RELATIONSHIP_OUTBOX_MAX_RETRY_MS:-60000}
      - RELATIONSHIP_OUTBOX_RETRY_JITTER_RATIO=${RELATIONSHIP_OUTBOX_RETRY_JITTER_RATIO:-0.2}
      - REDIS_LIMITER_TIMEOUT_MS=${REDIS_LIMITER_TIMEOUT_MS:-750}
      - MATCHMAKING_USER_LIMIT=${MATCHMAKING_USER_LIMIT:-6}
      - MATCHMAKING_IP_LIMIT=${MATCHMAKING_IP_LIMIT:-30}
      - MATCHMAKING_GLOBAL_LIMIT=${MATCHMAKING_GLOBAL_LIMIT:-2000}
      - PRESENCE_TTL_MS=${PRESENCE_TTL_MS:-90000}
      - FEEDBACK_UPLOAD_DIR=/app/data/feedback-uploads
      - RANKED_MATCHES_ENABLED=${RANKED_MATCHES_ENABLED:-false}
