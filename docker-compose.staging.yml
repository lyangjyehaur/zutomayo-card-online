# Staging 環境專用 docker-compose。
#
# 與 docker-compose.server4.yml 的差異：
#   - 使用 GHCR 預建 image（game / api / platform），不在 server 上 build
#   - 使用外部 PostgreSQL（verify-full + CA secret）與 Redis（rediss + ACL/password）
#   - port 映射避開 production：4000（game）/ 4001（api）/ 4002（platform）
#
# 使用方式：
#   GAME_IMAGE=ghcr.io/...@sha256:... API_IMAGE=... docker compose -f docker-compose.staging.yml up -d
#
# 環境變數：
#   PG_HOST/PG_DATABASE/PGSSLMODE/PG_CA_SECRET_NAME、REDIS_URL 等必填變數請透過 .env 提供。
#   GHCR_OWNER 可覆寫（fork 部署用），預設 lyangjyehaur。
#   五個 *_IMAGE 必須是 CD 產出的、已驗證簽章與 provenance 的完整 digest。
services:
  migrate:
    image: ${MIGRATE_IMAGE:?Set MIGRATE_IMAGE to a verified @sha256 digest}
    command: ['npm', 'run', 'db:migrate:release']
    environment:
      - NODE_ENV=production
      - PG_HOST=${PG_HOST:?Set external staging PostgreSQL PG_HOST}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_MIGRATION_USER:?Set PG_MIGRATION_USER in your environment or .env file}
      - PG_PASSWORD=${PG_MIGRATION_PASSWORD:?Set PG_MIGRATION_PASSWORD in your environment or .env file}
      - PG_MIGRATION_USER=${PG_MIGRATION_USER:?Set PG_MIGRATION_USER in your environment or .env file}
      - PG_DATABASE=${PG_DATABASE:?Set external staging PG_DATABASE}
      - PGSSLMODE=${PGSSLMODE:?Set PGSSLMODE=verify-full for external staging PostgreSQL}
      - PGSSLROOTCERT=/run/secrets/postgres_ca
      - NODE_EXTRA_CA_CERTS=/run/secrets/postgres_ca
      - PG_API_USER=${PG_API_USER:?Set PG_API_USER in your environment or .env file}
      - PG_GAME_USER=${PG_GAME_USER:?Set PG_GAME_USER in your environment or .env file}
      - PG_PLATFORM_USER=${PG_PLATFORM_USER:?Set PG_PLATFORM_USER in your environment or .env file}
      - PG_RETENTION_USER=${PG_RETENTION_USER:?Set PG_RETENTION_USER in your environment or .env file}
      - PG_MONITOR_USER=${PG_MONITOR_USER:?Set PG_MONITOR_USER in your environment or .env file}
      - PG_BACKUP_USER=${PG_BACKUP_USER:?Set PG_BACKUP_USER in your environment or .env file}
      - PG_WAL_USER=${PG_WAL_USER:?Set PG_WAL_USER in your environment or .env file}
      - REQUIRE_APP_ROLE_GATE=true
      - REQUIRE_ROLE_MATRIX_GATE=true
      - REQUIRE_DISTINCT_DB_ROLES=true
      - DATABASE_URL=
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
    secrets:
      - postgres_ca
    restart: 'no'

  game:
    image: ${GAME_IMAGE:?Set GAME_IMAGE to a verified @sha256 digest}
    ports:
      - '4000:3000'
    secrets:
      - postgres_ca
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:?Set APP_VERSION from the verified release manifest}
      - APP_BUILD_ID=${RELEASE_SHA:?Set RELEASE_SHA from the verified release manifest}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:?Set GAME_RULES_VERSION from the verified release manifest}
      - PG_HOST=${PG_HOST:?Set external staging PostgreSQL PG_HOST}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_GAME_USER:?Set PG_GAME_USER in your environment or .env file}
      - PG_PASSWORD=${PG_GAME_PASSWORD:?Set PG_GAME_PASSWORD in your environment or .env file}
      - PG_GAME_USER=${PG_GAME_USER:?Set PG_GAME_USER in your environment or .env file}
      - PG_DATABASE=${PG_DATABASE:?Set external staging PG_DATABASE}
      - PGSSLMODE=${PGSSLMODE:?Set PGSSLMODE=verify-full for external staging PostgreSQL}
      - PGSSLROOTCERT=/run/secrets/postgres_ca
      - NODE_EXTRA_CA_CERTS=/run/secrets/postgres_ca
      - DATABASE_URL=
      - RUNTIME_SCHEMA_DDL=false
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL=rediss://... for external staging Redis}
      - REDIS_DB=${STAGING_REDIS_DB:-3}
      - API_URL=${API_URL:-http://api:3001}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in your environment or .env file}
      - PLATFORM_SEAT_TOKEN_SECRET=${PLATFORM_SEAT_TOKEN_SECRET:?Set an independent PLATFORM_SEAT_TOKEN_SECRET in your environment or .env file}
      - METRICS_TOKEN=${METRICS_TOKEN:?Set a strong METRICS_TOKEN in your environment or .env file}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-staging}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${GAME_OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_EXPORTER_OTLP_TRACES_HEADERS=${GAME_OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      - OTEL_SERVICE_NAME=${GAME_OTEL_SERVICE_NAME:-zutomayo-game-staging}
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=staging}
      - PG_POOL_MAX=${PG_POOL_MAX:-20}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_CONN_PER_IP=${MAX_CONN_PER_IP:-10}
      - AUTH_REVOCATION_TIMEOUT_MS=${AUTH_REVOCATION_TIMEOUT_MS:-750}
      - GAME_AUTH_DB_QUERY_TIMEOUT_MS=${GAME_AUTH_DB_QUERY_TIMEOUT_MS:-1500}
      - API_PROXY_MAX_BODY_BYTES=${API_PROXY_MAX_BODY_BYTES:-3145728}
      - STALE_MATCH_TTL_MS=${STALE_MATCH_TTL_MS:-1800000}
      - CLEANUP_INTERVAL_MS=${CLEANUP_INTERVAL_MS:-300000}
      - RANKED_MATCHES_ENABLED=${RANKED_MATCHES_ENABLED:-false}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-172.16.0.0/12,127.0.0.1,::1}
      - GAME_DRAIN_GRACE_MS=${GAME_DRAIN_GRACE_MS:-5000}
      - SHUTDOWN_TIMEOUT_MS=${SHUTDOWN_TIMEOUT_MS:-30000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 45s

  api:
    image: ${API_IMAGE:?Set API_IMAGE to a verified @sha256 digest}
    ports:
      - '4001:3001'
    secrets:
      - postgres_ca
    volumes:
      - feedback_uploads:/app/data/feedback-uploads
    tmpfs:
      - /app/data/account-exports:rw,noexec,nosuid,nodev,size=268435456,mode=0700,uid=1000,gid=1000
    environment:
      - API_PORT=3001
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:?Set APP_VERSION from the verified release manifest}
      - APP_BUILD_ID=${RELEASE_SHA:?Set RELEASE_SHA from the verified release manifest}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:?Set GAME_RULES_VERSION from the verified release manifest}
      - PG_HOST=${PG_HOST:?Set external staging PostgreSQL PG_HOST}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_API_USER:?Set PG_API_USER in your environment or .env file}
      - PG_PASSWORD=${PG_API_PASSWORD:?Set PG_API_PASSWORD in your environment or .env file}
      - PG_API_USER=${PG_API_USER:?Set PG_API_USER in your environment or .env file}
      - PG_DATABASE=${PG_DATABASE:?Set external staging PG_DATABASE}
      - PGSSLMODE=${PGSSLMODE:?Set PGSSLMODE=verify-full for external staging PostgreSQL}
      - PGSSLROOTCERT=/run/secrets/postgres_ca
      - NODE_EXTRA_CA_CERTS=/run/secrets/postgres_ca
      - DATABASE_URL=
      - RUNTIME_SCHEMA_DDL=false
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL=rediss://... for external staging Redis}
      - REDIS_DB=${STAGING_REDIS_DB:-3}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in your environment or .env file}
      - METRICS_TOKEN=${METRICS_TOKEN:?Set a strong METRICS_TOKEN in your environment or .env file}
      - AUTH_MODE=${AUTH_MODE:-hybrid}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - TURNSTILE_REQUIRED=${TURNSTILE_REQUIRED:-false}
