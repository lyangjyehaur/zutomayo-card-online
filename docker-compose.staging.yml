      - DATABASE_URL=
      - RUNTIME_SCHEMA_DDL=false
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL=rediss://... for external staging Redis}
      - REDIS_DB=${STAGING_REDIS_DB:-3}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in your environment or .env file}
      - PLATFORM_SEAT_TOKEN_SECRET=${PLATFORM_SEAT_TOKEN_SECRET:?Set the same independent PLATFORM_SEAT_TOKEN_SECRET used by game in your environment or .env file}
