services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-zutomayo}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD in your environment or .env file}
      POSTGRES_DB: ${PG_DATABASE:-zutomayo}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER:-zutomayo} -d ${PG_DATABASE:-zutomayo}']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'allkeys-lru']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  game:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        APP_BUILD_ID: ${APP_BUILD_ID:-0.1.0}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-0.1.0}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_UMAMI_HOST_URL: ${VITE_UMAMI_HOST_URL:-}
        VITE_UMAMI_TELEMETRY_SCRIPT_URL: ${VITE_UMAMI_TELEMETRY_SCRIPT_URL:-}
        VITE_UMAMI_SECONDARY_WEBSITE_ID: ${VITE_UMAMI_SECONDARY_WEBSITE_ID:-}
        VITE_UMAMI_SECONDARY_HOST_URL: ${VITE_UMAMI_SECONDARY_HOST_URL:-}
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - APP_BUILD_ID=${APP_BUILD_ID:-0.1.0}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-0.1.0}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-zutomayo}
      - PG_PASSWORD=${PG_PASSWORD:?Set PG_PASSWORD in your environment or .env file}
      - PG_DATABASE=${PG_DATABASE:-zutomayo}
      - REDIS_URL=redis://redis:6379
      - REDIS_DB=${REDIS_DB:-0}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - JWT_SECRET=${JWT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        APP_BUILD_ID: ${APP_BUILD_ID:-0.1.0}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-0.1.0}
    ports:
      - '3001:3001'
    environment:
      - API_PORT=3001
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - APP_BUILD_ID=${APP_BUILD_ID:-0.1.0}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-0.1.0}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-zutomayo}
      - PG_PASSWORD=${PG_PASSWORD:?Set PG_PASSWORD in your environment or .env file}
      - PG_DATABASE=${PG_DATABASE:-zutomayo}
      - REDIS_URL=redis://redis:6379
      - REDIS_DB=${REDIS_DB:-0}
      - JWT_SECRET=${JWT_SECRET:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
