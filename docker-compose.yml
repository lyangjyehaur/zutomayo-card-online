services:
  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: ${PG_BOOTSTRAP_USER:-${PG_MIGRATION_USER:-zutomayo}}
      POSTGRES_PASSWORD: ${PG_BOOTSTRAP_PASSWORD:-${PG_MIGRATION_PASSWORD:-${PG_PASSWORD:?Set PG_BOOTSTRAP_PASSWORD, PG_MIGRATION_PASSWORD, or PG_PASSWORD in your environment or .env file}}}
      POSTGRES_DB: ${PG_DATABASE:-zutomayo}
      PG_MIGRATION_USER: ${PG_MIGRATION_USER:-zutomayo}
      PG_MIGRATION_PASSWORD: ${PG_MIGRATION_PASSWORD:-${PG_PASSWORD:?Set PG_MIGRATION_PASSWORD or PG_PASSWORD in your environment or .env file}}
      PG_APP_USER: ${PG_APP_USER:-zutomayo_app}
      PG_APP_PASSWORD: ${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_APP_PASSWORD or PG_PASSWORD in your environment or .env file}}
      PG_API_USER: ${PG_API_USER:-${PG_APP_USER:-zutomayo_app}}
      PG_API_PASSWORD: ${PG_API_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_API_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      PG_GAME_USER: ${PG_GAME_USER:-${PG_APP_USER:-zutomayo_app}}
      PG_GAME_PASSWORD: ${PG_GAME_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_GAME_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      PG_PLATFORM_USER: ${PG_PLATFORM_USER:-${PG_APP_USER:-zutomayo_app}}
      PG_PLATFORM_PASSWORD: ${PG_PLATFORM_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_PLATFORM_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      PG_RETENTION_USER: ${PG_RETENTION_USER:-zutomayo_retention}
      PG_RETENTION_PASSWORD: ${PG_RETENTION_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_RETENTION_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      PG_MONITOR_USER: ${PG_MONITOR_USER:-zutomayo_monitor}
      PG_MONITOR_PASSWORD: ${PG_MONITOR_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_MONITOR_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      PG_BACKUP_USER: ${PG_BACKUP_USER:-zutomayo_backup}
      PG_BACKUP_PASSWORD: ${PG_BACKUP_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_BACKUP_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      PG_WAL_USER: ${PG_WAL_USER:-zutomayo_wal}
      PG_WAL_PASSWORD: ${PG_WAL_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_WAL_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/postgres-init-roles.sh:/docker-entrypoint-initdb.d/10-roles.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2.5-alpine
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--maxmemory-policy',
        'noeviction',
        '--requirepass',
        '${REDIS_PASSWORD:-}',
      ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "${REDIS_PASSWORD:-}" --no-auth-warning ping 2>/dev/null || redis-cli ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.59
    ports:
      - '16686:16686' # UI
      - '4318:4318' # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  migrate:
    image: ${MIGRATE_IMAGE:-zutomayo-card-online-migrate:local}
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command: ['npm', 'run', 'db:migrate:release']
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_MIGRATION_USER:-zutomayo}
      - PG_PASSWORD=${PG_MIGRATION_PASSWORD:-${PG_PASSWORD:?Set PG_MIGRATION_PASSWORD or PG_PASSWORD in your environment or .env file}}
      - PG_DATABASE=${PG_DATABASE:-zutomayo}
      - PGSSLMODE=${PGSSLMODE:-disable}
      - PG_APP_USER=${PG_APP_USER:-zutomayo_app}
      - PG_API_USER=${PG_API_USER:-${PG_APP_USER:-zutomayo_app}}
      - PG_GAME_USER=${PG_GAME_USER:-${PG_APP_USER:-zutomayo_app}}
      - PG_PLATFORM_USER=${PG_PLATFORM_USER:-${PG_APP_USER:-zutomayo_app}}
      - PG_RETENTION_USER=${PG_RETENTION_USER:-zutomayo_retention}
      - PG_MONITOR_USER=${PG_MONITOR_USER:-zutomayo_monitor}
      - PG_BACKUP_USER=${PG_BACKUP_USER:-zutomayo_backup}
      - PG_WAL_USER=${PG_WAL_USER:-zutomayo_wal}
      - REQUIRE_APP_ROLE_GATE=true
      - REQUIRE_ROLE_MATRIX_GATE=${REQUIRE_ROLE_MATRIX_GATE:-true}
      - REQUIRE_DISTINCT_DB_ROLES=${REQUIRE_DISTINCT_DB_ROLES:-false}
      - DATABASE_URL=
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  game:
    image: ${GAME_IMAGE:-zutomayo-card-online-game:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
        APP_BUILD_ID: ${APP_BUILD_ID:-}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_UMAMI_HOST_URL: ${VITE_UMAMI_HOST_URL:-}
        VITE_UMAMI_TELEMETRY_SCRIPT_URL: ${VITE_UMAMI_TELEMETRY_SCRIPT_URL:-}
        VITE_UMAMI_SECONDARY_WEBSITE_ID: ${VITE_UMAMI_SECONDARY_WEBSITE_ID:-}
        VITE_UMAMI_SECONDARY_HOST_URL: ${VITE_UMAMI_SECONDARY_HOST_URL:-}
        VITE_IMGPROXY_BASE_URL: ${VITE_IMGPROXY_BASE_URL:-}
        VITE_PLATFORM_URL: ${VITE_PLATFORM_URL:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        SENTRY_DSN: ${SENTRY_DSN:-}
        SENTRY_URL: ${SENTRY_URL:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - PG_HOST=${PG_HOST:-postgres}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_GAME_USER:-${PG_APP_USER:-zutomayo_app}}
      - PG_PASSWORD=${PG_GAME_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_GAME_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      - PG_DATABASE=${PG_DATABASE:-zutomayo}
      - PGSSLMODE=${PGSSLMODE:-disable}
      - DATABASE_URL=
      - RUNTIME_SCHEMA_DDL=false
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_DB=${REDIS_DB:-0}
      - API_URL=${API_URL:-http://api:3001}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - 'JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in your environment or .env file (generate with: openssl rand -hex 32)}'
      - METRICS_TOKEN=${METRICS_TOKEN:?Set a strong METRICS_TOKEN for production-mode services}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_CONN_PER_IP=${MAX_CONN_PER_IP:-10}
      - RANKED_MATCHES_ENABLED=${RANKED_MATCHES_ENABLED:-false}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-172.16.0.0/12,127.0.0.1,::1}
      - AUTH_REVOCATION_TIMEOUT_MS=${AUTH_REVOCATION_TIMEOUT_MS:-750}
      - GAME_AUTH_DB_QUERY_TIMEOUT_MS=${GAME_AUTH_DB_QUERY_TIMEOUT_MS:-1500}
      - GAME_DRAIN_GRACE_MS=${GAME_DRAIN_GRACE_MS:-5000}
      - SHUTDOWN_TIMEOUT_MS=${SHUTDOWN_TIMEOUT_MS:-30000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 45s

  api:
    image: ${API_IMAGE:-zutomayo-card-online-api:local}
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
        APP_BUILD_ID: ${APP_BUILD_ID:-}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-}
    ports:
      - '3001:3001'
    environment:
      - API_PORT=3001
      - NODE_ENV=production
      - PG_HOST=${PG_HOST:-postgres}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_API_USER:-${PG_APP_USER:-zutomayo_app}}
      - PG_PASSWORD=${PG_API_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_API_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      - PG_DATABASE=${PG_DATABASE:-zutomayo}
      - PGSSLMODE=${PGSSLMODE:-disable}
      - DATABASE_URL=
      - RUNTIME_SCHEMA_DDL=false
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_DB=${REDIS_DB:-0}
      - 'JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in your environment or .env file (generate with: openssl rand -hex 32)}'
      - METRICS_TOKEN=${METRICS_TOKEN:?Set a strong METRICS_TOKEN for production-mode services}
      - ADMIN_TOTP_ENCRYPTION_KEY=${ADMIN_TOTP_ENCRYPTION_KEY:-}
      - ADMIN_SESSION_TTL_SECONDS=${ADMIN_SESSION_TTL_SECONDS:-3600}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - ACCOUNT_EMAIL_WEBHOOK_URL=${ACCOUNT_EMAIL_WEBHOOK_URL:-}
      - ACCOUNT_EMAIL_WEBHOOK_SECRET=${ACCOUNT_EMAIL_WEBHOOK_SECRET:-}
      - LOGTO_ENDPOINT=${LOGTO_ENDPOINT:-}
      - LOGTO_ISSUER=${LOGTO_ISSUER:-}
      - LOGTO_M2M_APP_ID=${LOGTO_M2M_APP_ID:-}
      - LOGTO_M2M_APP_SECRET=${LOGTO_M2M_APP_SECRET:-}
      - LOGTO_MANAGEMENT_RESOURCE=${LOGTO_MANAGEMENT_RESOURCE:-}
      - LOGTO_MANAGEMENT_SCOPE=${LOGTO_MANAGEMENT_SCOPE:-}
      - ACCOUNT_DELETION_RECOVERY_INTERVAL_MS=${ACCOUNT_DELETION_RECOVERY_INTERVAL_MS:-60000}
      - ACCOUNT_EXPORT_STORAGE_MODE=s3
      - ACCOUNT_EXPORT_S3_BUCKET=${ACCOUNT_EXPORT_S3_BUCKET:?Set the private account export S3 bucket}
      - ACCOUNT_EXPORT_S3_REGION=${ACCOUNT_EXPORT_S3_REGION:?Set the account export S3 region}
      - ACCOUNT_EXPORT_S3_PREFIX=${ACCOUNT_EXPORT_S3_PREFIX:-account-exports}
      - ACCOUNT_EXPORT_S3_ENDPOINT=${ACCOUNT_EXPORT_S3_ENDPOINT:-}
      - ACCOUNT_EXPORT_S3_FORCE_PATH_STYLE=${ACCOUNT_EXPORT_S3_FORCE_PATH_STYLE:-}
      - ACCOUNT_EXPORT_S3_CREDENTIALS_MODE=${ACCOUNT_EXPORT_S3_CREDENTIALS_MODE:?Set ACCOUNT_EXPORT_S3_CREDENTIALS_MODE to default or static}
      - ACCOUNT_EXPORT_S3_ACCESS_KEY_ID=${ACCOUNT_EXPORT_S3_ACCESS_KEY_ID:-}
      - ACCOUNT_EXPORT_S3_ACCESS_KEY_ID_FILE=${ACCOUNT_EXPORT_S3_ACCESS_KEY_ID_FILE:-}
      - ACCOUNT_EXPORT_S3_SECRET_ACCESS_KEY=${ACCOUNT_EXPORT_S3_SECRET_ACCESS_KEY:-}
      - ACCOUNT_EXPORT_S3_SECRET_ACCESS_KEY_FILE=${ACCOUNT_EXPORT_S3_SECRET_ACCESS_KEY_FILE:-}
      - ACCOUNT_EXPORT_S3_SESSION_TOKEN=${ACCOUNT_EXPORT_S3_SESSION_TOKEN:-}
      - ACCOUNT_EXPORT_S3_SESSION_TOKEN_FILE=${ACCOUNT_EXPORT_S3_SESSION_TOKEN_FILE:-}
      - ACCOUNT_EXPORT_S3_SERVER_SIDE_ENCRYPTION=${ACCOUNT_EXPORT_S3_SERVER_SIDE_ENCRYPTION:-AES256}
      - ACCOUNT_EXPORT_S3_KMS_KEY_ID=${ACCOUNT_EXPORT_S3_KMS_KEY_ID:-}
      - ACCOUNT_EXPORT_S3_VERSIONING_MODE=${ACCOUNT_EXPORT_S3_VERSIONING_MODE:?Set ACCOUNT_EXPORT_S3_VERSIONING_MODE to disabled or required}
      - ACCOUNT_EXPORT_S3_LIFECYCLE_CONFIRMED=${ACCOUNT_EXPORT_S3_LIFECYCLE_CONFIRMED:?Set true only after enforcing lifecycle cleanup on the export prefix}
      - ACCOUNT_EXPORT_S3_TIMEOUT_MS=${ACCOUNT_EXPORT_S3_TIMEOUT_MS:-60000}
      - ACCOUNT_EXPORT_PSEUDONYM_KEY=${ACCOUNT_EXPORT_PSEUDONYM_KEY:?Set an independent 32+ byte ACCOUNT_EXPORT_PSEUDONYM_KEY}
      - ACCOUNT_EXPORT_TMP_DIR=/app/data/account-exports
      - ACCOUNT_EXPORT_INTERVAL_MS=${ACCOUNT_EXPORT_INTERVAL_MS:-1000}
      - ACCOUNT_EXPORT_LEASE_MS=${ACCOUNT_EXPORT_LEASE_MS:-300000}
      - ACCOUNT_EXPORT_BATCH_SIZE=${ACCOUNT_EXPORT_BATCH_SIZE:-2}
      - ACCOUNT_EXPORT_DOWNLOAD_CONCURRENCY=${ACCOUNT_EXPORT_DOWNLOAD_CONCURRENCY:-1}
      - ACCOUNT_EXPORT_EXPIRY_SECONDS=${ACCOUNT_EXPORT_EXPIRY_SECONDS:-604800}
      - ACCOUNT_EXPORT_MAX_ATTEMPTS=${ACCOUNT_EXPORT_MAX_ATTEMPTS:-5}
      - ACCOUNT_EXPORT_BASE_RETRY_MS=${ACCOUNT_EXPORT_BASE_RETRY_MS:-5000}
      - ACCOUNT_EXPORT_MAX_RETRY_MS=${ACCOUNT_EXPORT_MAX_RETRY_MS:-300000}
      - ACCOUNT_EXPORT_MAX_BYTES=${ACCOUNT_EXPORT_MAX_BYTES:-104857600}
      - RANKED_MATCHES_ENABLED=${RANKED_MATCHES_ENABLED:-false}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-172.16.0.0/12,127.0.0.1,::1}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - IMGPROXY_INTERNAL_BASE_URL=${IMGPROXY_INTERNAL_BASE_URL:-}
      - IMGPROXY_KEY=${IMGPROXY_KEY:-}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-}
      - IMGPROXY_ALLOWED_SOURCES=${IMGPROXY_ALLOWED_SOURCES:-https://r2.dan.tw/cards/}
      - IMGPROXY_CACHE_CONTROL=${IMGPROXY_CACHE_CONTROL:-public, max-age=31536000, immutable}
      - RATE_LIMIT_IMGPROXY=${RATE_LIMIT_IMGPROXY:-600}
      - CHAT_TRANSLATION_ENDPOINT=${CHAT_TRANSLATION_ENDPOINT:-}
      - CHAT_TRANSLATION_API_KEY=${CHAT_TRANSLATION_API_KEY:-}
      - CHAT_TRANSLATION_PROVIDER=${CHAT_TRANSLATION_PROVIDER:-}
      - CHAT_TRANSLATION_MODEL=${CHAT_TRANSLATION_MODEL:-}
      - CHAT_TRANSLATION_TIMEOUT_MS=${CHAT_TRANSLATION_TIMEOUT_MS:-10000}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_HTTP_DRAIN_TIMEOUT_MS=${API_HTTP_DRAIN_TIMEOUT_MS:-10000}
      - SHUTDOWN_TIMEOUT_MS=${SHUTDOWN_TIMEOUT_MS:-30000}
    tmpfs:
      - /app/data/account-exports:rw,noexec,nosuid,nodev,size=268435456,mode=0700,uid=1000,gid=1000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3001/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 45s

  platform:
    image: ${PLATFORM_IMAGE:-zutomayo-card-online-platform:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
        APP_BUILD_ID: ${APP_BUILD_ID:-}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-}
    command: ['npm', 'run', 'platform']
    ports:
      - '3002:3002'
    environment:
      - PLATFORM_PORT=3002
      - PLATFORM_PUBLIC_ADDRESS=${PLATFORM_PUBLIC_ADDRESS:-ws://localhost:3002}
      - NODE_ENV=production
      - PG_HOST=${PG_HOST:-postgres}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_PLATFORM_USER:-${PG_APP_USER:-zutomayo_app}}
      - PG_PASSWORD=${PG_PLATFORM_PASSWORD:-${PG_APP_PASSWORD:-${PG_PASSWORD:?Set PG_PLATFORM_PASSWORD or PG_APP_PASSWORD in your environment or .env file}}}
      - PG_DATABASE=${PG_DATABASE:-zutomayo}
      - PGSSLMODE=${PGSSLMODE:-disable}
      - DATABASE_URL=
      - RUNTIME_SCHEMA_DDL=false
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_DB=${REDIS_DB:-0}
      - 'JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in your environment or .env file (generate with: openssl rand -hex 32)}'
      - METRICS_TOKEN=${METRICS_TOKEN:?Set a strong METRICS_TOKEN for production-mode services}
      - PLATFORM_REDIS_MODE=redis
      - PLATFORM_FRIEND_STORE=postgres
      - PLATFORM_BLOCK_STORE=postgres
      - PLATFORM_MATCH_PARTICIPANT_STORE=postgres
      - PLATFORM_CHAT_PREVIEW_STORE=postgres
      - PLATFORM_ADMISSION_IP_LIMIT=${PLATFORM_ADMISSION_IP_LIMIT:-30}
      - PLATFORM_ADMISSION_USER_LIMIT=${PLATFORM_ADMISSION_USER_LIMIT:-10}
      - PLATFORM_ADMISSION_GLOBAL_LIMIT=${PLATFORM_ADMISSION_GLOBAL_LIMIT:-2000}
      - PLATFORM_ADMISSION_WINDOW_SECONDS=${PLATFORM_ADMISSION_WINDOW_SECONDS:-60}
      - PLATFORM_ADMISSION_REDIS_TIMEOUT_MS=${PLATFORM_ADMISSION_REDIS_TIMEOUT_MS:-750}
      - PLATFORM_AUTH_DB_POOL_MAX=${PLATFORM_AUTH_DB_POOL_MAX:-8}
      - PLATFORM_AUTH_DB_QUERY_TIMEOUT_MS=${PLATFORM_AUTH_DB_QUERY_TIMEOUT_MS:-1500}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-172.16.0.0/12,127.0.0.1,::1}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PLATFORM_DRAIN_GRACE_MS=${PLATFORM_DRAIN_GRACE_MS:-5000}
      - SHUTDOWN_TIMEOUT_MS=${SHUTDOWN_TIMEOUT_MS:-30000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3002/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 45s

  # PgBouncer connection pooler. Optional — not started by default.
  # Enable with: docker compose --profile pgbouncer up
  # or combine with docker-compose.pgbouncer.yml to also repoint game/api/platform
  # at PgBouncer. See docs/DEPLOYMENT.md (PgBouncer section).
  pgbouncer:
    profiles: ['pgbouncer']
    image: edoburu/pgbouncer:1.22.1-p1
    environment:
      - DB_USER=${PG_APP_USER:-zutomayo_app}
      - DB_PASSWORD=${PG_APP_PASSWORD:-${PG_PASSWORD:-}}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${PG_DATABASE:-zutomayo}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - RESERVE_POOL_SIZE=5
      - SERVER_IDLE_TIMEOUT=300
    ports:
      - '6432:6432'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
