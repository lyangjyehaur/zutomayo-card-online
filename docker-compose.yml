services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-zutomayo}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-zutomayo_dev}
      POSTGRES_DB: ${PG_DATABASE:-zutomayo}
    ports:
      - '5432:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER:-zutomayo} -d ${PG_DATABASE:-zutomayo}']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'allkeys-lru']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  game:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT:-}
        VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID:-}
        VITE_LOGTO_API_RESOURCE: ${VITE_LOGTO_API_RESOURCE:-}
        VITE_GLITCHTIP_DSN: ${VITE_GLITCHTIP_DSN:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0}
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-zutomayo}
      - PG_PASSWORD=${PG_PASSWORD:-zutomayo_dev}
      - PG_DATABASE=${PG_DATABASE:-zutomayo}
      - REDIS_URL=redis://redis:6379
      - REDIS_DB=${REDIS_DB:-0}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - GLITCHTIP_DSN=${GLITCHTIP_DSN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - API_PORT=3001
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-zutomayo}
      - PG_PASSWORD=${PG_PASSWORD:-zutomayo_dev}
      - PG_DATABASE=${PG_DATABASE:-zutomayo}
      - REDIS_URL=redis://redis:6379
      - REDIS_DB=${REDIS_DB:-0}
      - JWT_SECRET=${JWT_SECRET:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - LOGTO_ISSUER=${LOGTO_ISSUER:-}
      - LOGTO_AUDIENCE=${LOGTO_AUDIENCE:-}
      - GLITCHTIP_DSN=${GLITCHTIP_DSN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
