      - CHAT_TRANSLATION_PROVIDER=${CHAT_TRANSLATION_PROVIDER:-}
      - CHAT_TRANSLATION_MODEL=${CHAT_TRANSLATION_MODEL:-}
      - CHAT_TRANSLATION_TIMEOUT_MS=${CHAT_TRANSLATION_TIMEOUT_MS:-10000}
      - CHAT_BLOCKED_WORDS=${CHAT_BLOCKED_WORDS:-}
      - CHAT_REVIEW_WORDS=${CHAT_REVIEW_WORDS:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${API_OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_EXPORTER_OTLP_TRACES_HEADERS=${API_OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      - OTEL_SERVICE_NAME=${API_OTEL_SERVICE_NAME:-zutomayo-api}
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=production}
      - PG_POOL_MAX=${PG_POOL_MAX:-20}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - default
      - 1panel-network
    volumes:
      - ${PG_CA_FILE:?Set PG_CA_FILE to the mounted PostgreSQL CA}:/run/secrets/zutomayo-service-ca.crt:ro
      - feedback_uploads:/app/data/feedback-uploads
    tmpfs:
      - /app/data/account-exports:rw,noexec,nosuid,nodev,size=268435456,mode=0700,uid=1000,gid=1000
