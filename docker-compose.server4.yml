services:
  migrate:
    image: ghcr.io/${GHCR_OWNER:-lyangjyehaur}/zutomayo-card-online-migrate:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command: ['npm', 'run', 'db:migrate']
    env_file: .env
    environment:
      - PG_HOST=postgresql
      - PG_PORT=5432
    networks:
      - default
      - 1panel-network
    restart: 'no'

  game:
    image: ghcr.io/${GHCR_OWNER:-lyangjyehaur}/zutomayo-card-online-game:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
        APP_BUILD_ID: ${APP_BUILD_ID:-}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_UMAMI_HOST_URL: ${VITE_UMAMI_HOST_URL:-}
        VITE_UMAMI_TELEMETRY_SCRIPT_URL: ${VITE_UMAMI_TELEMETRY_SCRIPT_URL:-}
        VITE_UMAMI_SECONDARY_WEBSITE_ID: ${VITE_UMAMI_SECONDARY_WEBSITE_ID:-}
        VITE_UMAMI_SECONDARY_HOST_URL: ${VITE_UMAMI_SECONDARY_HOST_URL:-}
        VITE_IMGPROXY_BASE_URL: ${VITE_IMGPROXY_BASE_URL:-}
        VITE_PLATFORM_URL: ${VITE_PLATFORM_URL:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        SENTRY_DSN: ${SENTRY_DSN:-}
        SENTRY_URL: ${SENTRY_URL:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-}
      - APP_BUILD_ID=${APP_BUILD_ID:-}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-}
      - PG_HOST=postgresql
      - PG_PORT=5432
      - REDIS_DB=${REDIS_DB:-0}
      - API_URL=${API_URL:-http://api:3001}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_CONN_PER_IP=${MAX_CONN_PER_IP:-10}
      - RANKED_MATCHES_ENABLED=${RANKED_MATCHES_ENABLED:-false}
    networks:
      - default
      - 1panel-network
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/${GHCR_OWNER:-lyangjyehaur}/zutomayo-card-online-api:${TAG:-latest}
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
        APP_BUILD_ID: ${APP_BUILD_ID:-}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-}
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      - API_PORT=3001
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-}
      - APP_BUILD_ID=${APP_BUILD_ID:-}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-}
      - PG_HOST=postgresql
      - PG_PORT=5432
      - REDIS_DB=${REDIS_DB:-0}
      - IMGPROXY_INTERNAL_BASE_URL=${IMGPROXY_INTERNAL_BASE_URL:-http://imgproxy:8080}
      - IMGPROXY_KEY=${IMGPROXY_KEY:-}
      - IMGPROXY_SALT=${IMGPROXY_SALT:-}
      - IMGPROXY_ALLOWED_SOURCES=${IMGPROXY_ALLOWED_SOURCES:-https://r2.dan.tw/cards/}
      - IMGPROXY_CACHE_CONTROL=${IMGPROXY_CACHE_CONTROL:-public, max-age=31536000, immutable}
      - RATE_LIMIT_IMGPROXY=${RATE_LIMIT_IMGPROXY:-600}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - default
      - 1panel-network
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  platform:
    image: ghcr.io/${GHCR_OWNER:-lyangjyehaur}/zutomayo-card-online-platform:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
        APP_BUILD_ID: ${APP_BUILD_ID:-}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-}
    command: ['npm', 'run', 'platform']
    ports:
      - '3002:3002'
    env_file: .env
    environment:
      - PLATFORM_PORT=3002
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-}
      - APP_BUILD_ID=${APP_BUILD_ID:-}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-}
      - PG_HOST=postgresql
      - PG_PORT=5432
      - REDIS_DB=${REDIS_DB:-0}
      - PLATFORM_REDIS_MODE=redis
      - PLATFORM_FRIEND_STORE=postgres
      - PLATFORM_MATCH_PARTICIPANT_STORE=postgres
      - PLATFORM_CHAT_PREVIEW_STORE=postgres
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - default
      - 1panel-network
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  1panel-network:
    external: true
