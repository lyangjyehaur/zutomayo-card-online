services:
  migrate:
    image: ${MIGRATE_IMAGE:?Set MIGRATE_IMAGE to a verified @sha256 digest}
    command: ['npm', 'run', 'db:migrate:release']
    environment:
      - NODE_ENV=production
      - PG_HOST=postgresql
      - PG_PORT=5432
      - PG_USER=${PG_MIGRATION_USER:?Set PG_MIGRATION_USER in .env}
      - PG_PASSWORD=${PG_MIGRATION_PASSWORD:?Set PG_MIGRATION_PASSWORD in .env}
      - PG_MIGRATION_USER=${PG_MIGRATION_USER:?Set PG_MIGRATION_USER in .env}
      - PG_DATABASE=${PG_DATABASE:?Set PG_DATABASE in .env}
      - PGSSLMODE=${PGSSLMODE:?Set PGSSLMODE=verify-full for production PostgreSQL}
      - PG_SSLROOTCERT=${PG_SSLROOTCERT:?Set PG_SSLROOTCERT to the mounted PostgreSQL CA}
      - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS:?Set NODE_EXTRA_CA_CERTS to the mounted service CA}
      - PG_API_USER=${PG_API_USER:?Set PG_API_USER in .env}
      - PG_GAME_USER=${PG_GAME_USER:?Set PG_GAME_USER in .env}
      - PG_PLATFORM_USER=${PG_PLATFORM_USER:?Set PG_PLATFORM_USER in .env}
      - PG_RETENTION_USER=${PG_RETENTION_USER:?Set PG_RETENTION_USER in .env}
      - PG_MONITOR_USER=${PG_MONITOR_USER:?Set PG_MONITOR_USER in .env}
      - PG_BACKUP_USER=${PG_BACKUP_USER:?Set PG_BACKUP_USER in .env}
      - PG_WAL_USER=${PG_WAL_USER:?Set PG_WAL_USER in .env}
      - REQUIRE_APP_ROLE_GATE=true
      - REQUIRE_ROLE_MATRIX_GATE=true
      - REQUIRE_DISTINCT_DB_ROLES=true
      - DATABASE_URL=
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
    networks:
      - default
      - 1panel-network
    volumes:
      - ${PG_CA_FILE:?Set PG_CA_FILE to the mounted PostgreSQL CA}:/run/secrets/zutomayo-service-ca.crt:ro
    restart: 'no'

  game:
    image: ${GAME_IMAGE:?Set GAME_IMAGE to a verified @sha256 digest}
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:?Set APP_VERSION from the verified release manifest}
      - APP_BUILD_ID=${RELEASE_SHA:?Set RELEASE_SHA from the verified release manifest}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:?Set GAME_RULES_VERSION from the verified release manifest}
      - PG_HOST=postgresql
      - PG_PORT=5432
      - PG_USER=${PG_GAME_USER:?Set PG_GAME_USER in .env}
      - PG_PASSWORD=${PG_GAME_PASSWORD:?Set PG_GAME_PASSWORD in .env}
      - PG_GAME_USER=${PG_GAME_USER:?Set PG_GAME_USER in .env}
      - PG_DATABASE=${PG_DATABASE:?Set PG_DATABASE in .env}
      - PGSSLMODE=${PGSSLMODE:?Set PGSSLMODE=verify-full for production PostgreSQL}
      - PG_SSLROOTCERT=${PG_SSLROOTCERT:?Set PG_SSLROOTCERT to the mounted PostgreSQL CA}
      - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS:?Set NODE_EXTRA_CA_CERTS to the mounted service CA}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL in .env}
      - REDIS_DB=${REDIS_DB:-0}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${GAME_OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_EXPORTER_OTLP_TRACES_HEADERS=${GAME_OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      - OTEL_SERVICE_NAME=${GAME_OTEL_SERVICE_NAME:-zutomayo-game}
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=production}
      - PG_POOL_MAX=${PG_POOL_MAX:-20}
      - DATABASE_URL=
      - RUNTIME_SCHEMA_DDL=false
      - EXPECTED_SCHEMA_MIGRATION=${EXPECTED_SCHEMA_MIGRATION:?Set EXPECTED_SCHEMA_MIGRATION to the release migration basename}
      - EXPECTED_SCHEMA_CHECKSUM=${EXPECTED_SCHEMA_CHECKSUM:?Set EXPECTED_SCHEMA_CHECKSUM to the release migration SHA-256}
      - API_URL=${API_URL:-http://api:3001}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - PLATFORM_SEAT_TOKEN_SECRET=${PLATFORM_SEAT_TOKEN_SECRET:?Set an independent PLATFORM_SEAT_TOKEN_SECRET in .env}
      - METRICS_TOKEN=${METRICS_TOKEN:?Set a strong METRICS_TOKEN in .env}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_CONN_PER_IP=${MAX_CONN_PER_IP:-10}
      - AUTH_REVOCATION_TIMEOUT_MS=${AUTH_REVOCATION_TIMEOUT_MS:-750}
      - GAME_AUTH_DB_QUERY_TIMEOUT_MS=${GAME_AUTH_DB_QUERY_TIMEOUT_MS:-1500}
      - API_PROXY_MAX_BODY_BYTES=${API_PROXY_MAX_BODY_BYTES:-3145728}
      - STALE_MATCH_TTL_MS=${STALE_MATCH_TTL_MS:-1800000}
      - CLEANUP_INTERVAL_MS=${CLEANUP_INTERVAL_MS:-300000}
      - RANKED_MATCHES_ENABLED=${RANKED_MATCHES_ENABLED:-false}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-172.16.0.0/12,127.0.0.1,::1}
      - GAME_DRAIN_GRACE_MS=${GAME_DRAIN_GRACE_MS:-5000}
      - SHUTDOWN_TIMEOUT_MS=${SHUTDOWN_TIMEOUT_MS:-30000}
    networks:
      - default
      - 1panel-network
    volumes:
      - ${PG_CA_FILE:?Set PG_CA_FILE to the mounted PostgreSQL CA}:/run/secrets/zutomayo-service-ca.crt:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 45s

  api:
    image: ${API_IMAGE:?Set API_IMAGE to a verified @sha256 digest}
    ports:
      - '127.0.0.1:3001:3001'
    environment:
      - API_PORT=3001
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:?Set APP_VERSION from the verified release manifest}
      - APP_BUILD_ID=${RELEASE_SHA:?Set RELEASE_SHA from the verified release manifest}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:?Set GAME_RULES_VERSION from the verified release manifest}
      - PG_HOST=postgresql
      - PG_PORT=5432
      - PG_USER=${PG_API_USER:?Set PG_API_USER in .env}
      - PG_PASSWORD=${PG_API_PASSWORD:?Set PG_API_PASSWORD in .env}
      - PG_API_USER=${PG_API_USER:?Set PG_API_USER in .env}
      - PG_DATABASE=${PG_DATABASE:?Set PG_DATABASE in .env}
      - PGSSLMODE=${PGSSLMODE:?Set PGSSLMODE=verify-full for production PostgreSQL}
      - PG_SSLROOTCERT=${PG_SSLROOTCERT:?Set PG_SSLROOTCERT to the mounted PostgreSQL CA}
      - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS:?Set NODE_EXTRA_CA_CERTS to the mounted service CA}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL in .env}
      - REDIS_DB=${REDIS_DB:-0}
      - DATABASE_URL=
      - RUNTIME_SCHEMA_DDL=false
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - METRICS_TOKEN=${METRICS_TOKEN:?Set a strong METRICS_TOKEN in .env}
      - AUTH_MODE=${AUTH_MODE:-hybrid}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - TURNSTILE_REQUIRED=${TURNSTILE_REQUIRED:-false}
      - TURNSTILE_SITEVERIFY_URL=${TURNSTILE_SITEVERIFY_URL:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
      - OAUTH_TOKEN_ENCRYPTION_KEY=${OAUTH_TOKEN_ENCRYPTION_KEY:?Set an independent 32+ character OAUTH_TOKEN_ENCRYPTION_KEY in .env}
      - OAUTH_PUBLIC_BASE_URL=${OAUTH_PUBLIC_BASE_URL:-${PUBLIC_BASE_URL:?Set OAUTH_PUBLIC_BASE_URL or PUBLIC_BASE_URL in .env}}
      - OAUTH_HTTP_TIMEOUT_MS=${OAUTH_HTTP_TIMEOUT_MS:-8000}
      - OAUTH_REDIS_TIMEOUT_MS=${OAUTH_REDIS_TIMEOUT_MS:-1500}
      - OAUTH_HTTP_MAX_ATTEMPTS=${OAUTH_HTTP_MAX_ATTEMPTS:-2}
      - ACCESS_TOKEN_TTL_SECONDS=${ACCESS_TOKEN_TTL_SECONDS:-3600}
      - REFRESH_TOKEN_TTL_SECONDS=${REFRESH_TOKEN_TTL_SECONDS:-604800}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-}
      - AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE:-Lax}
      - ADMIN_TOTP_ENCRYPTION_KEY=${ADMIN_TOTP_ENCRYPTION_KEY:?Set a 32+ character ADMIN_TOTP_ENCRYPTION_KEY in .env}
      - ADMIN_SESSION_TTL_SECONDS=${ADMIN_SESSION_TTL_SECONDS:-3600}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-${OAUTH_PUBLIC_BASE_URL}}
      - ACCOUNT_EMAIL_WEBHOOK_URL=${ACCOUNT_EMAIL_WEBHOOK_URL:-}
      - ACCOUNT_EMAIL_WEBHOOK_SECRET=${ACCOUNT_EMAIL_WEBHOOK_SECRET:-}
      - LOGTO_ENDPOINT=${LOGTO_ENDPOINT:-}
      - LOGTO_ISSUER=${LOGTO_ISSUER:-}
      - LOGTO_DISCOVERY_URL=${LOGTO_DISCOVERY_URL:-}
      - LOGTO_APP_ID=${LOGTO_APP_ID:-}
      - LOGTO_APP_SECRET=${LOGTO_APP_SECRET:-}
      - LOGTO_OAUTH_SCOPE=${LOGTO_OAUTH_SCOPE:-openid profile email}
      - LOGTO_ACCOUNT_CENTER_URL=${LOGTO_ACCOUNT_CENTER_URL:-}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-}
      - DISCORD_OAUTH_CLIENT_ID=${DISCORD_OAUTH_CLIENT_ID:-}
      - DISCORD_OAUTH_CLIENT_SECRET=${DISCORD_OAUTH_CLIENT_SECRET:-}
      - LOGTO_M2M_APP_ID=${LOGTO_M2M_APP_ID:-}
      - LOGTO_M2M_APP_SECRET=${LOGTO_M2M_APP_SECRET:-}
      - LOGTO_MANAGEMENT_RESOURCE=${LOGTO_MANAGEMENT_RESOURCE:-}
      - LOGTO_MANAGEMENT_SCOPE=${LOGTO_MANAGEMENT_SCOPE:-}
      - ACCOUNT_DELETION_RECOVERY_INTERVAL_MS=${ACCOUNT_DELETION_RECOVERY_INTERVAL_MS:-60000}
      - ACCOUNT_EXPORT_STORAGE_MODE=s3
      - ACCOUNT_EXPORT_S3_BUCKET=${ACCOUNT_EXPORT_S3_BUCKET:?Set the private account export S3 bucket}
      - ACCOUNT_EXPORT_S3_REGION=${ACCOUNT_EXPORT_S3_REGION:?Set the account export S3 region}
      - ACCOUNT_EXPORT_S3_PREFIX=${ACCOUNT_EXPORT_S3_PREFIX:-account-exports}
      - ACCOUNT_EXPORT_S3_ENDPOINT=${ACCOUNT_EXPORT_S3_ENDPOINT:-}
      - ACCOUNT_EXPORT_S3_FORCE_PATH_STYLE=${ACCOUNT_EXPORT_S3_FORCE_PATH_STYLE:-}
      - ACCOUNT_EXPORT_S3_CREDENTIALS_MODE=${ACCOUNT_EXPORT_S3_CREDENTIALS_MODE:?Set ACCOUNT_EXPORT_S3_CREDENTIALS_MODE to default or static}
      - ACCOUNT_EXPORT_S3_ACCESS_KEY_ID=${ACCOUNT_EXPORT_S3_ACCESS_KEY_ID:-}
      - ACCOUNT_EXPORT_S3_ACCESS_KEY_ID_FILE=${ACCOUNT_EXPORT_S3_ACCESS_KEY_ID_FILE:-}
      - ACCOUNT_EXPORT_S3_SECRET_ACCESS_KEY=${ACCOUNT_EXPORT_S3_SECRET_ACCESS_KEY:-}
      - ACCOUNT_EXPORT_S3_SECRET_ACCESS_KEY_FILE=${ACCOUNT_EXPORT_S3_SECRET_ACCESS_KEY_FILE:-}
      - ACCOUNT_EXPORT_S3_SESSION_TOKEN=${ACCOUNT_EXPORT_S3_SESSION_TOKEN:-}
      - ACCOUNT_EXPORT_S3_SESSION_TOKEN_FILE=${ACCOUNT_EXPORT_S3_SESSION_TOKEN_FILE:-}
      - ACCOUNT_EXPORT_S3_SERVER_SIDE_ENCRYPTION=${ACCOUNT_EXPORT_S3_SERVER_SIDE_ENCRYPTION:-AES256}
      - ACCOUNT_EXPORT_S3_KMS_KEY_ID=${ACCOUNT_EXPORT_S3_KMS_KEY_ID:-}
      - ACCOUNT_EXPORT_S3_VERSIONING_MODE=${ACCOUNT_EXPORT_S3_VERSIONING_MODE:?Set ACCOUNT_EXPORT_S3_VERSIONING_MODE to disabled or required}
      - ACCOUNT_EXPORT_S3_LIFECYCLE_CONFIRMED=${ACCOUNT_EXPORT_S3_LIFECYCLE_CONFIRMED:?Set true only after enforcing lifecycle cleanup on the export prefix}
      - ACCOUNT_EXPORT_S3_TIMEOUT_MS=${ACCOUNT_EXPORT_S3_TIMEOUT_MS:-60000}
      - ACCOUNT_EXPORT_PSEUDONYM_KEY=${ACCOUNT_EXPORT_PSEUDONYM_KEY:?Set an independent 32+ byte ACCOUNT_EXPORT_PSEUDONYM_KEY}
      - ACCOUNT_EXPORT_TMP_DIR=/app/data/account-exports
      - ACCOUNT_EXPORT_INTERVAL_MS=${ACCOUNT_EXPORT_INTERVAL_MS:-1000}
      - ACCOUNT_EXPORT_LEASE_MS=${ACCOUNT_EXPORT_LEASE_MS:-300000}
      - ACCOUNT_EXPORT_BATCH_SIZE=${ACCOUNT_EXPORT_BATCH_SIZE:-2}
