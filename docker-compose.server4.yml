services:
  game:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        APP_BUILD_ID: ${APP_BUILD_ID:-0.1.0}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-0.1.0}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_UMAMI_HOST_URL: ${VITE_UMAMI_HOST_URL:-}
        VITE_UMAMI_TELEMETRY_SCRIPT_URL: ${VITE_UMAMI_TELEMETRY_SCRIPT_URL:-}
        VITE_UMAMI_SECONDARY_WEBSITE_ID: ${VITE_UMAMI_SECONDARY_WEBSITE_ID:-}
        VITE_UMAMI_SECONDARY_HOST_URL: ${VITE_UMAMI_SECONDARY_HOST_URL:-}
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - APP_BUILD_ID=${APP_BUILD_ID:-0.1.0}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-0.1.0}
      - PG_HOST=postgresql
      - PG_PORT=5432
      - REDIS_DB=0
    networks:
      - default
      - 1panel-network
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        APP_BUILD_ID: ${APP_BUILD_ID:-0.1.0}
        GAME_RULES_VERSION: ${GAME_RULES_VERSION:-0.1.0}
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      - API_PORT=3001
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - APP_BUILD_ID=${APP_BUILD_ID:-0.1.0}
      - GAME_RULES_VERSION=${GAME_RULES_VERSION:-0.1.0}
      - PG_HOST=postgresql
      - PG_PORT=5432
      - REDIS_DB=0
    networks:
      - default
      - 1panel-network
    restart: unless-stopped

networks:
  1panel-network:
    external: true
